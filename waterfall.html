<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEXUS ASIA — Capital Stack</title>
<link rel="stylesheet" href="css/styles.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>
<div class="terminal-shell">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="main-content">
    <div class="topbar">
      <div class="topbar-title">NEXUS ASIA · <span>CAPITAL STACK WATERFALL</span></div>
      <div style="margin-left:auto;display:flex;gap:10px;align-items:center">
        <select class="form-select" style="width:260px" id="projectSelect" onchange="renderStack()"></select>
        <a href="index.html" class="btn btn-sm btn-ghost">← Terminal</a>
      </div>
    </div>
    <div class="page-content">

      <div class="grid-2" style="margin-bottom:16px">
        <!-- Waterfall Visual -->
        <div class="panel" style="grid-column:1/-1">
          <div class="panel-header">
            <span class="panel-title">Capital Stack <span class="accent">Seniority Waterfall</span></span>
            <div class="panel-actions">
              <span style="font-size:10px;color:var(--text-muted);font-family:var(--font-mono)" id="stackProjectLabel">—</span>
            </div>
          </div>
          <div class="panel-body" id="waterfallPanel">
            <div style="color:var(--text-muted);font-size:12px">Select a project above</div>
          </div>
        </div>
      </div>

      <div class="grid-2" style="margin-bottom:16px">
        <div class="panel">
          <div class="panel-header"><span class="panel-title">Stack <span class="accent">Metrics</span></span></div>
          <div class="panel-body" id="stackMetrics">—</div>
        </div>
        <div class="panel">
          <div class="panel-header"><span class="panel-title">Recovery <span class="accent">Scenarios</span></span></div>
          <div class="panel-body">
            <div class="chart-container" style="height:220px"><canvas id="recoveryChart"></canvas></div>
          </div>
        </div>
      </div>

      <!-- Portfolio Stack Overview -->
      <div class="panel">
        <div class="panel-header"><span class="panel-title">Portfolio — Capital Stack <span class="accent">Overview</span></span></div>
        <div style="overflow-x:auto">
          <table class="data-table">
            <thead>
              <tr><th>PROJECT</th><th>TOTAL COST</th><th>SENIOR DEBT</th><th>MEZZ / SUB DEBT</th><th>EQUITY</th><th>LTC</th><th>LTV</th><th>CUSHION</th><th>STATUS</th></tr>
            </thead>
            <tbody id="stackTableBody"></tbody>
          </table>
        </div>
      </div>

    </div>
  </div>
</div>
<script src="data/seed-data.js"></script>
<script src="js/config.js" onerror="void(0)"></script>
<script src="js/scoring-engine.js"></script>
<script src="js/charts.js"></script>
<script>
const projects = NEXUS_DATA.projects;
const loans    = NEXUS_DATA.loans;

// Build capital stack for each project
function getStack(project) {
  const loan = loans.find(l => l.id === project.loanId);
  if (!loan) return null;
  const totalCost = loan.sanctionedAmount / (project.ltc / 100);
  const seniorDebt = loan.sanctionedAmount;
  // Simulate mezz / equity based on typical structure
  const mezzRatio = project.ltc > 70 ? 0.08 : project.ltc > 60 ? 0.05 : 0.03;
  const mezzDebt  = Math.round(totalCost * mezzRatio);
  const equity    = totalCost - seniorDebt - mezzDebt;
  const gdv       = totalCost / (project.ltc / 100) * 1.25; // Gross Development Value estimate
  return {
    totalCost, seniorDebt, mezzDebt, equity, gdv,
    loan, project,
    seniorPct : Math.round(seniorDebt / totalCost * 100),
    mezzPct   : Math.round(mezzDebt  / totalCost * 100),
    equityPct : Math.round(equity    / totalCost * 100),
    ltc       : project.ltc,
    ltv       : project.ltv,
    cushion   : Math.round(gdv - totalCost),
    cushionPct: Math.round((gdv - totalCost) / gdv * 100)
  };
}

function formatCr(v) {
  if (v >= 1e10) return `₹${(v/1e10).toFixed(1)}Bn`;
  if (v >= 1e7)  return `₹${(v/1e7).toFixed(0)}Cr`;
  return `₹${(v/1e5).toFixed(0)}L`;
}

function renderStack() {
  const pid = document.getElementById('projectSelect').value;
  const p   = projects.find(x => x.id === pid);
  if (!p) return;
  const s = getStack(p);
  if (!s) return;

  document.getElementById('stackProjectLabel').textContent = p.name + ' · ' + p.city;

  // Waterfall bars
  const bars = [
    { label: 'Senior Debt',  pct: s.seniorPct, color: '#ff3355', detail: `${s.loan.lender} · ${s.loan.interestRate}% p.a. · ${s.loan.loanType}`, amount: formatCr(s.seniorDebt), seniority: '1st' },
    { label: 'Mezz / Sub Debt', pct: s.mezzPct, color: '#ffaa00', detail: 'Subordinated debt · Typically 14–18% p.a.', amount: formatCr(s.mezzDebt), seniority: '2nd' },
    { label: 'Developer Equity', pct: s.equityPct, color: '#00ff88', detail: 'Promoter equity contribution + receivables', amount: formatCr(s.equity), seniority: '3rd (Residual)' }
  ];

  document.getElementById('waterfallPanel').innerHTML = `
    <div style="margin-bottom:20px">
      <div style="font-size:11px;color:var(--text-muted);font-family:var(--font-mono);margin-bottom:10px">
        TOTAL PROJECT COST: <span style="color:var(--text-primary);font-weight:600">${formatCr(s.totalCost)}</span> &nbsp;·&nbsp;
        ESTIMATED GDV: <span style="color:var(--cyan);font-weight:600">${formatCr(s.gdv)}</span> &nbsp;·&nbsp;
        EQUITY CUSHION: <span style="color:var(--green);font-weight:600">${formatCr(s.cushion)} (${s.cushionPct}%)</span>
      </div>

      <!-- Stacked bar -->
      <div style="height:52px;border-radius:8px;overflow:hidden;display:flex;margin-bottom:20px;box-shadow:0 0 24px rgba(0,0,0,0.4)">
        ${bars.map(b => `
          <div style="width:${b.pct}%;background:${b.color};display:flex;align-items:center;justify-content:center;font-family:var(--font-mono);font-size:11px;font-weight:700;color:#000;transition:filter 0.15s;cursor:default;position:relative" title="${b.label}: ${b.amount} (${b.pct}%)" onmouseover="this.style.filter='brightness(1.2)'" onmouseout="this.style.filter=''">
            ${b.pct > 8 ? `${b.pct}%` : ''}
          </div>`).join('')}
      </div>

      <!-- Seniority ladder -->
      <div style="display:flex;flex-direction:column;gap:10px">
        ${bars.map((b, i) => `
          <div style="display:flex;align-items:center;gap:14px;padding:14px 16px;background:var(--bg-surface);border:1px solid var(--border);border-radius:var(--radius);border-left:4px solid ${b.color}">
            <div style="width:28px;height:28px;border-radius:50%;background:${b.color}22;border:2px solid ${b.color};display:flex;align-items:center;justify-content:center;font-family:var(--font-mono);font-size:11px;font-weight:700;color:${b.color};flex-shrink:0">${i+1}</div>
            <div style="flex:1">
              <div style="font-size:13px;font-weight:600;margin-bottom:3px">${b.label}</div>
              <div style="font-size:10px;color:var(--text-muted)">${b.detail}</div>
            </div>
            <div style="text-align:right">
              <div style="font-family:var(--font-mono);font-size:14px;font-weight:700;color:${b.color}">${b.amount}</div>
              <div style="font-size:9px;color:var(--text-muted)">${b.pct}% of stack</div>
            </div>
            <div style="text-align:right;border-left:1px solid var(--border);padding-left:14px;min-width:80px">
              <div style="font-size:9px;color:var(--text-muted);font-family:var(--font-mono);text-transform:uppercase">Seniority</div>
              <div style="font-size:11px;color:${b.color};font-weight:600">${b.seniority}</div>
            </div>
          </div>
        `).join('')}
      </div>

      <!-- Waterfall legend -->
      <div style="margin-top:16px;padding:12px 16px;background:var(--bg-deep);border:1px solid var(--border);border-radius:var(--radius);font-size:11px;color:var(--text-secondary);line-height:1.7">
        <strong style="color:var(--cyan)">Recovery waterfall on enforcement:</strong>
        1st: Senior debt (${formatCr(s.seniorDebt)}) → 
        2nd: Mezzanine (${formatCr(s.mezzDebt)}) → 
        3rd: Developer equity (${formatCr(s.equity)}) → 
        Residual to equity holders if GDV (${formatCr(s.gdv)}) exceeds total cost.
        Current equity cushion: <strong style="color:${s.cushionPct >= 20 ? 'var(--green)' : s.cushionPct >= 10 ? 'var(--amber)' : 'var(--red)'}">${s.cushionPct}%</strong>
      </div>
    </div>
  `;

  // Stack metrics
  document.getElementById('stackMetrics').innerHTML = `
    <table class="info-table">
      <tr><td>Total Project Cost</td><td style="font-family:var(--font-mono);font-weight:600">${formatCr(s.totalCost)}</td></tr>
      <tr><td>Estimated GDV</td><td style="font-family:var(--font-mono)">${formatCr(s.gdv)}</td></tr>
      <tr><td>Senior Debt (LTC)</td><td style="font-family:var(--font-mono);color:${s.ltc <= 65 ? 'var(--green)' : s.ltc <= 78 ? 'var(--amber)' : 'var(--red)'}">${s.ltc}% (${formatCr(s.seniorDebt)})</td></tr>
      <tr><td>Loan-to-Value (LTV)</td><td style="font-family:var(--font-mono);color:${s.ltv <= 60 ? 'var(--green)' : s.ltv <= 72 ? 'var(--amber)' : 'var(--red)'}">${s.ltv}%</td></tr>
      <tr><td>Mezzanine Debt</td><td style="font-family:var(--font-mono)">${formatCr(s.mezzDebt)} (${s.mezzPct}%)</td></tr>
      <tr><td>Equity Contribution</td><td style="font-family:var(--font-mono)">${formatCr(s.equity)} (${s.equityPct}%)</td></tr>
      <tr><td>Equity Cushion to GDV</td><td style="font-family:var(--font-mono);color:${s.cushionPct >= 20 ? 'var(--green)' : s.cushionPct >= 10 ? 'var(--amber)' : 'var(--red)'}">${formatCr(s.cushion)} (${s.cushionPct}%)</td></tr>
      <tr><td>Loan Status</td><td><span class="badge ${s.loan.status === 'ACTIVE' ? 'green' : s.loan.status === 'NPA' ? 'red' : 'amber'}">${s.loan.status}</span></td></tr>
    </table>
  `;

  // Recovery scenario chart
  NexusCharts.destroyChart('recoveryChart');
  const ctx = document.getElementById('recoveryChart');
  const scenarios = ['GDV −40%', 'GDV −25%', 'GDV −10%', 'Base GDV', 'GDV +10%'];
  const multipliers = [0.60, 0.75, 0.90, 1.00, 1.10];
  new Chart(ctx, {
    type: 'bar',
    data: {
      labels: scenarios,
      datasets: [
        {
          label: 'Senior Recovery',
          data: multipliers.map(m => Math.min(100, (s.gdv * m / s.seniorDebt) * 100)),
          backgroundColor: multipliers.map(m => m * s.gdv >= s.seniorDebt ? '#00ff8888' : '#ff335588'),
          borderRadius: 4
        },
        {
          label: 'Full Recovery',
          data: multipliers.map(m => Math.min(100, (s.gdv * m / s.totalCost) * 100)),
          backgroundColor: '#0088ff55',
          borderRadius: 4
        }
      ]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { position: 'bottom', labels: { font: { size: 10 } } } },
      scales: {
        x: { grid: { display: false } },
        y: { grid: { color: 'rgba(255,255,255,0.04)' }, ticks: { callback: v => v + '%' }, max: 120 }
      }
    }
  });
}

function renderPortfolioTable() {
  document.getElementById('stackTableBody').innerHTML = projects.map(p => {
    const s = getStack(p);
    if (!s) return '';
    const c = s.cushionPct;
    return `<tr>
      <td><div style="font-weight:600;font-size:12px">${p.name}</div><div style="font-size:9px;color:var(--text-muted)">${p.city}</div></td>
      <td style="font-family:var(--font-mono);font-size:11px">${formatCr(s.totalCost)}</td>
      <td style="font-family:var(--font-mono);font-size:11px">${formatCr(s.seniorDebt)} <span style="color:var(--text-muted);font-size:9px">(${s.seniorPct}%)</span></td>
      <td style="font-family:var(--font-mono);font-size:11px">${formatCr(s.mezzDebt)} <span style="color:var(--text-muted);font-size:9px">(${s.mezzPct}%)</span></td>
      <td style="font-family:var(--font-mono);font-size:11px">${formatCr(s.equity)} <span style="color:var(--text-muted);font-size:9px">(${s.equityPct}%)</span></td>
      <td style="font-family:var(--font-mono);font-weight:700;color:${s.ltc <= 65 ? 'var(--green)' : s.ltc <= 78 ? 'var(--amber)' : 'var(--red)'}">${s.ltc}%</td>
      <td style="font-family:var(--font-mono);color:${s.ltv <= 60 ? 'var(--green)' : s.ltv <= 72 ? 'var(--amber)' : 'var(--red)'}">${s.ltv}%</td>
      <td style="font-family:var(--font-mono);font-weight:700;color:${c >= 20 ? 'var(--green)' : c >= 10 ? 'var(--amber)' : 'var(--red)'}">${c}%</td>
      <td><span class="badge ${p.alertLevel.toLowerCase()}">${p.alertLevel}</span></td>
    </tr>`;
  }).join('');
}

// Populate select
const sel = document.getElementById('projectSelect');
projects.forEach(p => { sel.innerHTML += `<option value="${p.id}">${p.name} — ${p.city}</option>`; });

renderStack();
renderPortfolioTable();

// Sidebar
document.getElementById('sidebar').innerHTML = `<div class="sidebar-logo"><div class="logo-mark"><div class="logo-icon">◈</div><div><div>NEXUS ASIA</div><div class="logo-sub">Credit Intelligence</div></div></div></div>
<nav class="sidebar-nav">
  <a class="nav-item" href="index.html"><span class="nav-icon">⬡</span><span>Portfolio</span></a>
  <a class="nav-item" href="covenants.html"><span class="nav-icon">📋</span><span>Covenants</span></a>
  <a class="nav-item active" href="waterfall.html"><span class="nav-icon">⧫</span><span>Capital Stack</span></a>
  <a class="nav-item" href="stress.html"><span class="nav-icon">⚡</span><span>Stress Test</span></a>
  <a class="nav-item" href="schedule.html"><span class="nav-icon">📅</span><span>Repayment</span></a>
  <a class="nav-item" href="reports.html"><span class="nav-icon">⊟</span><span>Reports</span></a>
  <a class="nav-item" href="vault.html"><span class="nav-icon">🗄</span><span>Doc Vault</span></a>
  <a class="nav-item" href="audit.html"><span class="nav-icon">🔍</span><span>Audit Trail</span></a>
  <a class="nav-item" href="schema.html"><span class="nav-icon">⊞</span><span>DB Schema</span></a>
</nav>
<div class="sidebar-footer"><div class="status-ticker"><div class="status-dot"></div><span id="sc">--:--</span></div></div>`;
setInterval(() => document.getElementById('sc').textContent = new Date().toLocaleTimeString('en-IN',{hour12:false}), 1000);
</script>
</body>
</html>
